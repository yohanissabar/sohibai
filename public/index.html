<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SohibAI • Your Life OS</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; font-family: system-ui, -apple-system, sans-serif; }
    .glow-manis { box-shadow: 0 0 45px rgba(255, 105, 180, 0.4); }
    .glow-gagah { box-shadow: 0 0 45px rgba(0, 210, 255, 0.4); }
    @keyframes pulse-slow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    .animate-pulse-slow { animation: pulse-slow 4s infinite ease-in-out; }
    .eye-blink { animation: blink 4s infinite; }
    @keyframes blink { 0%, 96%, 100% { transform: scaleY(1); } 98% { transform: scaleY(0.1); } }
    .talking .mouth { animation: speak 0.3s infinite alternate; }
    @keyframes speak { 0% { transform: scaleY(0.5); } 100% { transform: scaleY(2.2); } }
  </style>
</head>
<body class="text-white flex flex-col h-screen max-w-md mx-auto relative overflow-hidden select-none">

  <header class="flex justify-between items-center p-4 pt-8 border-b border-white/10 z-10 bg-black/40 backdrop-blur-md">
    <div class="flex items-center space-x-2">
      <span class="w-3 h-3 rounded-full bg-green-500 animate-ping"></span>
      <h1 id="ui-ai-name" class="font-bold text-lg tracking-wider">SOHIB•AI</h1>
    </div>
    <button onclick="toggleModal(true)" class="p-2 bg-white/10 rounded-full hover:bg-white/20 transition">
      ⚙️ Atur Persona
    </button>
  </header>

  <div class="flex-1 flex flex-col items-center justify-center p-6 text-center relative">
    <div id="face-container" class="w-48 h-48 rounded-full border-4 border-pink-500 flex items-center justify-center bg-black/60 transition-all duration-500 animate-pulse-slow glow-manis mb-6">
      <svg id="robot-face" viewBox="0 0 100 100" class="w-32 h-32 text-white fill-current transition-transform duration-300">
        <g class="eye-blink origin-center">
          <rect id="eye-left" x="25" y="35" width="12" height="16" rx="6" class="fill-pink-400"/>
          <rect id="eye-right" x="63" y="35" width="12" height="16" rx="6" class="fill-pink-400"/>
        </g>
        <rect id="mouth" x="40" y="65" width="20" height="6" rx="3" class="mouth origin-center fill-white"/>
      </svg>
    </div>

    <span id="ui-mode-badge" class="px-4 py-1 rounded-full text-xs font-semibold uppercase tracking-widest bg-pink-500/20 text-pink-400 border border-pink-500/30">
      💖 Mode Manis
    </span>
    <p id="ui-status-text" class="text-xs text-gray-400 mt-3 h-4">Mengetik atau sentuh mic untuk ngobrol...</p>
  </div>

  <div id="chat-container" class="h-48 overflow-y-auto px-4 space-y-3 flex flex-col justify-end pb-2 text-sm">
    <div class="bg-white/10 p-3 rounded-2xl rounded-bl-none self-start max-w-[85%]">
      Hai! Aku siap dengerin cerita kamu hari ini. Ada yang mau diungkapin? 😊
    </div>
  </div>

  <div class="p-4 bg-black/80 backdrop-blur-lg border-t border-white/10 pb-8">
    <form id="chat-form" class="flex items-center space-x-2">
      <button type="button" id="mic-btn" class="p-3.5 bg-white/10 rounded-full text-lg hover:bg-white/20 transition flex-shrink-0">
        🎤
      </button>
      <input type="text" id="user-input" placeholder="Ketik sesuatu..." autocomplete="off"
        class="flex-1 bg-white/5 border border-white/10 rounded-full px-4 py-3 text-sm focus:outline-none focus:border-white/40">
      <button type="submit" id="send-btn" class="p-3.5 bg-blue-600 rounded-full text-white font-medium hover:bg-blue-500 transition flex-shrink-0">
        ➤
      </button>
    </form>
  </div>

  <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-6">
    <div class="bg-zinc-900 border border-white/10 p-6 rounded-3xl w-full max-w-sm space-y-4">
      <h3 class="font-bold text-lg border-b border-white/10 pb-2">Sesuaikan SohibAI</h3>
      <div>
        <label class="text-xs text-gray-400">Nama Kamu</label>
        <input type="text" id="set-username" class="w-full bg-black border border-white/20 rounded-xl p-2.5 mt-1 text-sm">
      </div>
      <div>
        <label class="text-xs text-gray-400">Nama AI Sohibmu</label>
        <input type="text" id="set-ainame" class="w-full bg-black border border-white/20 rounded-xl p-2.5 mt-1 text-sm">
      </div>
      <div>
        <label class="text-xs text-gray-400">Karakter & Kepribadian</label>
        <select id="set-mode" class="w-full bg-black border border-white/20 rounded-xl p-2.5 mt-1 text-sm">
          <option value="manis">🌸 Manis & Suportif (Perempuan)</option>
          <option value="gagah">⚡ Gagah & Protektif (Laki-laki)</option>
        </select>
      </div>
      <div class="flex space-x-2 pt-2">
        <button onclick="toggleModal(false)" class="flex-1 py-2.5 bg-white/10 rounded-xl text-sm">Batal</button>
        <button onclick="saveProfile()" class="flex-1 py-2.5 bg-blue-600 rounded-xl text-sm font-semibold">Simpan</button>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

    const face = document.getElementById('face-container');
    const robotFace = document.getElementById('robot-face');
    const chatContainer = document.getElementById('chat-container');
    const statusText = document.getElementById('ui-status-text');
    let synth = window.speechSynthesis;
    let recognition;

    async function loadProfile() {
      try {
        const res = await fetch('/api/profile');
        const data = await res.json();
        document.getElementById('ui-ai-name').innerText = data.ai_name.toUpperCase() + '•AI';
        document.getElementById('set-username').value = data.user_name;
        document.getElementById('set-ainame').value = data.ai_name;
        document.getElementById('set-mode').value = data.mode;
        applyTheme(data.mode);
      } catch(e) {}
    }
    loadProfile();

    function applyTheme(mode) {
      const isManis = mode === 'manis';
      face.className = `w-48 h-48 rounded-full border-4 flex items-center justify-center bg-black/60 transition-all duration-500 animate-pulse-slow mb-6 ${isManis ? 'border-pink-500 glow-manis' : 'border-cyan-400 glow-gagah'}`;
      document.getElementById('eye-left').style.fill = isManis ? '#f472b6' : '#22d3ee';
      document.getElementById('eye-right').style.fill = isManis ? '#f472b6' : '#22d3ee';
      const badge = document.getElementById('ui-mode-badge');
      badge.className = `px-4 py-1 rounded-full text-xs font-semibold uppercase tracking-widest border ${isManis ? 'bg-pink-500/20 text-pink-400 border-pink-500/30' : 'bg-cyan-500/20 text-cyan-300 border-cyan-500/30'}`;
      badge.innerText = isManis ? '💖 Mode Manis' : '⚡ Mode Gagah';
    }

    document.getElementById('chat-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      appendBubble(text, 'user');
      statusText.innerText = 'SohibAI sedang berpikir & mengingat...';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        statusText.innerText = '';
        appendBubble(data.reply, 'ai');
        speakText(data.reply, data.mode);
      } catch (err) {
        statusText.innerText = 'Gagal terhubung ke Cloudflare.';
      }
    });

    function appendBubble(text, sender) {
      const div = document.createElement('div');
      div.className = sender === 'user'
        ? 'bg-blue-600 text-white p-3 rounded-2xl rounded-br-none self-end max-w-[85%] ml-auto'
        : 'bg-white/10 text-gray-100 p-3 rounded-2xl rounded-bl-none self-start max-w-[85%]';
      div.innerText = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function speakText(text, mode) {
      if (!synth) return;
      synth.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'id-ID';
      utterance.pitch = mode === 'manis' ? 1.2 : 0.85;
      utterance.rate = 1.0;
      
      utterance.onstart = () => robotFace.classList.add('talking');
      utterance.onend = () => robotFace.classList.remove('talking');
      synth.speak(utterance);
    }

    const micBtn = document.getElementById('mic-btn');
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRec();
      recognition.lang = 'id-ID';
      recognition.onstart = () => { micBtn.classList.add('bg-red-500', 'animate-pulse'); statusText.innerText = 'Mendengarkan...'; };
      recognition.onend = () => { micBtn.classList.remove('bg-red-500', 'animate-pulse'); };
      recognition.onresult = (e) => {
        document.getElementById('user-input').value = e.results[0][0].transcript;
        document.getElementById('send-btn').click();
      };
      micBtn.onclick = () => recognition.start();
    } else {
      micBtn.style.display = 'none';
    }

    function toggleModal(show) {
      document.getElementById('settings-modal').style.display = show ? 'flex' : 'none';
    }
    async function saveProfile() {
      const user_name = document.getElementById('set-username').value;
      const ai_name = document.getElementById('set-ainame').value;
      const mode = document.getElementById('set-mode').value;
      await fetch('/api/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_name, ai_name, mode })
      });
      document.getElementById('ui-ai-name').innerText = ai_name.toUpperCase() + '•AI';
      applyTheme(mode);
      toggleModal(false);
    }
  </script>
</body>
</html>
